<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101014" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FEFEFE" media="(prefers-color-scheme: light)" />
    <title>Muralize offline</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        color-scheme: light;
        --ink: #1D1B20;
        --muted: #49454F;
        --surface: #FEFEFE;
        --soft: #F4EFF4;
        --border: #CAC4D0;
        --button-bg: #1D1B20;
        --button-text: #fff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --ink: #F7F2FA;
          --muted: #CAC4D0;
          --surface: #101014;
          --soft: #221f2a;
          --border: #4B4356;
          --button-bg: #D0BCFF;
          --button-text: #1D1B20;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--surface);
        color: var(--ink);
      }
      main {
        width: min(100%, 420px);
        border: 1px solid var(--border);
        background: var(--soft);
        border-radius: 28px;
        padding: 28px;
        text-align: center;
      }
      img {
        width: 88px;
        height: 88px;
        border-radius: 24px;
        margin-bottom: 18px;
      }
      h1 {
        font-size: 1.35rem;
        line-height: 1.2;
        margin: 0 0 10px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.5;
        font-size: 0.95rem;
      }
      button, a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        border: 0;
        color: var(--button-text);
        background: var(--button-bg);
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192x192.png" alt="Muralize" />
      <h1>Você está offline</h1>
      <p>O Muralize não conseguiu carregar os eventos agora. Verifique sua conexão e tente novamente.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
